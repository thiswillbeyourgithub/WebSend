services:
  websend:
    container_name: websend
    build:
      context: ../src
      dockerfile: ../docker/Dockerfile
    ports:
      # If using oauth2-proxy, do NOT expose this port directly.
      # Instead, access the app through oauth2-proxy's port (4180).
      - "127.0.0.1:7395:8080"
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - DEV=${DEV:-0}
      - STUN_SERVER=${STUN_SERVER:-}
      - STUN_GOOGLE_FALLBACK=${STUN_GOOGLE_FALLBACK:-true}
      - TURN_SERVER=${TURN_SERVER:-}
      - TURN_SECRET=${TURN_SECRET:-}
      - TURN_CREDENTIAL_TTL=${TURN_CREDENTIAL_TTL:-86400}
      - TURN_TIMEOUT=${TURN_TIMEOUT:-15}
      - TURNS_PORT=${TURNS_PORT:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - DEV_FORCE_CONNECTION=${DEV_FORCE_CONNECTION:-DEFAULT}
      - UMAMI_URL=${UMAMI_URL:-}
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID:-}
      - UMAMI_DNT=${UMAMI_DNT:-true}
    # Security hardening options
    security_opt:
      # Prevent privilege escalation via setuid/setgid binaries
      - no-new-privileges:true
    # Read-only root filesystem to prevent runtime modifications
    read_only: true
    # Temporary writable directories if needed (none required for this app)
    # tmpfs:
    #   - /tmp:size=10M,mode=1777
    # Drop all capabilities since we don't need any privileged operations
    cap_drop:
      - ALL
    # Run as non-root user (matches Dockerfile USER directive)
    user: "1001:1001"
    # Limit resources to prevent DoS
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    # Disable container from gaining additional privileges
    privileged: false
    # Health check to ensure the service is responsive
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "https://$DOMAIN/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── oauth2-proxy (Keycloak SSO) — Experimental ─────────────────────
  # Uncomment to put WebSend behind Keycloak authentication via oauth2-proxy.
  # This provides SSO gating: only authenticated Keycloak users can access
  # the app. No user/group/permission mapping is performed — it is a simple
  # "authenticated or not" gate.
  #
  # Prerequisites:
  #   1. A running Keycloak instance with a client configured for WebSend
  #   2. Set OAUTH2_* variables in your .env file (see env.example)
  #   3. Point your reverse proxy (Caddy) at 127.0.0.1:4180 instead of 7395
  #   4. Remove or comment out the websend "ports" section above
  #
  # Note on WebSocket: oauth2-proxy supports WebSocket proxying, but
  # long-lived WS connections (used for signaling) may break when the
  # OAuth token expires mid-session. Monitor and adjust token lifetimes
  # in Keycloak if you experience disconnections.
  #
  # Note on coturn: oauth2-proxy only protects HTTP/WS traffic. coturn
  # (STUN/TURN over UDP/TCP) is outside its scope, but is indirectly
  # protected because unauthenticated users cannot reach the signaling
  # server to obtain TURN credentials.
  # ─────────────────────────────────────────────────────────────────────
  # oauth2-proxy:
  #   image: quay.io/oauth2-proxy/oauth2-proxy:latest
  #   container_name: oauth2-proxy
  #   ports:
  #     - "127.0.0.1:4180:4180"
  #   environment:
  #     - OAUTH2_PROXY_PROVIDER=keycloak-oidc
  #     - OAUTH2_PROXY_OIDC_ISSUER_URL=${OAUTH2_OIDC_ISSUER_URL}
  #     - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_CLIENT_ID}
  #     - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_CLIENT_SECRET}
  #     - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_COOKIE_SECRET}
  #     - OAUTH2_PROXY_UPSTREAM=http://websend:8080
  #     - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
  #     - OAUTH2_PROXY_EMAIL_DOMAINS=*
  #     - OAUTH2_PROXY_COOKIE_SECURE=true
  #     - OAUTH2_PROXY_PASS_ACCESS_TOKEN=true
  #   depends_on:
  #     - websend
  #   security_opt:
  #     - no-new-privileges:true
  #   read_only: true
  #   cap_drop:
  #     - ALL
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 128M
  #         cpus: '0.5'

  # ── coturn TURN relay server ──────────────────────────────────────────
  # This project ships with a bundled coturn (https://github.com/coturn/coturn)
  # service, pre-configured to work out of the box with WebSend.
  # coturn acts as a TURN relay for when direct peer-to-peer WebRTC fails
  # (e.g. symmetric NAT, restrictive firewalls, carrier-grade NAT).
  #
  # To use it, you MUST set TURN_SERVER and TURN_SECRET in your .env file
  # (see env.example). Without these, the app will still work but only
  # when direct P2P connections succeed.
  #
  # If you already have a coturn instance (e.g., for Nextcloud Talk), you can
  # skip this service entirely and point TURN_SERVER / TURN_SECRET to your
  # existing server instead.
  # ─────────────────────────────────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    ports:
      # Use a different port if 3478 is already in use (e.g., by another coturn)
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49161:49152-49161/udp"
    # To enable TURNS (TURN-over-TLS), remove --no-tls and add:
    #   --tls-listening-port=${TURNS_PORT:-8443}
    #   --cert=/etc/coturn/certs/cert.pem
    #   --pkey=/etc/coturn/certs/key.pem
    # Then mount the certificate files via a volume:
    #   volumes:
    #     - /path/to/certs:/etc/coturn/certs:ro
    # If you use Caddy, you can reuse its managed certificates. Caddy stores them
    # under its data directory; the exact path depends on the ACME issuer and domain.
    # Example (adjust to your domain and Caddy data path):
    #   volumes:
    #     - /path/to/caddy_data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/your.domain:/certs:ro
    # And expose the TURNS port:
    #     - "${TURNS_PORT:-8443}:${TURNS_PORT:-8443}/tcp"
    #
    # Docker NAT: --external-ip format is PUBLIC_IP/INTERNAL_IP.
    # 0.0.0.0 as internal means "all container interfaces" (correct for Docker).
    # NOTE: DOMAIN must be an IP address here, NOT a hostname — coturn does not
    # resolve DNS for --external-ip. Set a separate TURN_EXTERNAL_IP env var if
    # your DOMAIN is a hostname.
    command: >
      -n
      --log-file=stdout
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --fingerprint
      --no-multicast-peers
      --no-cli
      --no-dtls
      --no-tls
      --realm=websend
      --min-port=49152
      --max-port=49161
      --listening-port=3478
      --external-ip=${TURN_EXTERNAL_IP:-${DOMAIN:-127.0.0.1}}
      --check-origin-consistency
      --cpus=1
    # Security hardening options
    # Note: no-new-privileges is NOT set because the turnserver binary
    # has file capabilities that require privilege transition at exec.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=10M,mode=1777
    privileged: false
    # Note: coturn image runs as root by default; running as non-root
    # may break startup. The other hardening measures mitigate this.
    # We run coturn as root so it can read TLS certificate files mounted from Caddy.
    user: "0:0"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
