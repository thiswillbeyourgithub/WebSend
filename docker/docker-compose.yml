services:
  imagesecuresend:
    container_name: imagesecuresend
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    ports:
      - "127.0.0.1:7395:8080"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - DEV=${DEV:-0}
      - STUN_SERVER=${STUN_SERVER:-}
      - STUN_GOOGLE_FALLBACK=${STUN_GOOGLE_FALLBACK:-true}
      - TURN_SERVER=${TURN_SERVER:-}
      - TURN_SECRET=${TURN_SECRET:-}
      - TURN_CREDENTIAL_TTL=${TURN_CREDENTIAL_TTL:-86400}
      - TURN_TIMEOUT=${TURN_TIMEOUT:-15}
      - TURNS_PORT=${TURNS_PORT:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - DEV_FORCE_CONNECTION=${DEV_FORCE_CONNECTION:-DEFAULT}
    # Security hardening options
    security_opt:
      # Prevent privilege escalation via setuid/setgid binaries
      - no-new-privileges:true
    # Read-only root filesystem to prevent runtime modifications
    read_only: true
    # Temporary writable directories if needed (none required for this app)
    # tmpfs:
    #   - /tmp:size=10M,mode=1777
    # Drop all capabilities since we don't need any privileged operations
    cap_drop:
      - ALL
    # Run as non-root user (matches Dockerfile USER directive)
    user: "1001:1001"
    # Limit resources to prevent DoS
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    # Disable container from gaining additional privileges
    privileged: false
    # Health check to ensure the service is responsive
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "https://$DOMAIN/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # TURN relay server for when direct P2P fails (symmetric NAT, etc.)
  # Uses time-based credentials with shared secret (see env.example for TURN_SECRET).
  # If you already have a coturn instance (e.g., for Nextcloud), you can reuse it
  # by setting TURN_SERVER and TURN_SECRET in your env file instead.
  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    ports:
      # Use a different port if 3478 is already in use (e.g., by another coturn)
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49161:49152-49161/udp"
    # To enable TURNS (TURN-over-TLS), remove --no-tls and add:
    #   --tls-listening-port=${TURNS_PORT:-8443}
    #   --cert=/etc/coturn/certs/cert.pem
    #   --pkey=/etc/coturn/certs/key.pem
    # Then mount the certificate files via a volume:
    #   volumes:
    #     - /path/to/certs:/etc/coturn/certs:ro
    # If you use Caddy, you can reuse its managed certificates. Caddy stores them
    # under its data directory; the exact path depends on the ACME issuer and domain.
    # Example (adjust to your domain and Caddy data path):
    #   volumes:
    #     - /path/to/caddy_data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/your.domain:/certs:ro
    # And expose the TURNS port:
    #     - "${TURNS_PORT:-8443}:${TURNS_PORT:-8443}/tcp"
    #
    # Docker NAT: --external-ip format is PUBLIC_IP/INTERNAL_IP.
    # 0.0.0.0 as internal means "all container interfaces" (correct for Docker).
    # NOTE: DOMAIN must be an IP address here, NOT a hostname — coturn does not
    # resolve DNS for --external-ip. Set a separate TURN_EXTERNAL_IP env var if
    # your DOMAIN is a hostname.
    command: >
      -n
      --log-file=stdout
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --fingerprint
      --no-multicast-peers
      --no-cli
      --no-dtls
      --no-tls
      --realm=imagesecuresend
      --min-port=49152
      --max-port=49161
      --listening-port=3478
      --external-ip=${TURN_EXTERNAL_IP:-${DOMAIN:-127.0.0.1}}
      --no-stun
      --check-origin-consistency
      --cpus=1
    # Security hardening options
    # Note: no-new-privileges is NOT set because the turnserver binary
    # has file capabilities that require privilege transition at exec.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=10M,mode=1777
    privileged: false
    # Note: coturn image runs as root by default; running as non-root
    # may break startup. The other hardening measures mitigate this.
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
