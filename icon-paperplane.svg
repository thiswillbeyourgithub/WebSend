<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256">
  <title>WebSend — paper plane over globe</title>
  <!-- globe -->
  <g fill="none" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round">
    <circle cx="24" cy="40" r="16"/>
    <ellipse cx="24" cy="40" rx="16" ry="6"/>
    <ellipse cx="24" cy="40" rx="6" ry="16"/>
    <line x1="8" y1="40" x2="40" y2="40"/>
  </g>
  <!-- dotted arc (flight path) -->
  <path d="M14 30 Q34 4 56 14" fill="none" stroke="#2563eb" stroke-width="2"
        stroke-linecap="round" stroke-dasharray="1 4" opacity="0.6"/>
  <!-- paper plane -->
  <g fill="#2563eb" stroke="#2563eb" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="56,14 40,18 46,22 44,30"/>
    <polygon points="56,14 46,22 44,30" fill="#1e3a8a"/>
  </g>
</svg>
